<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Search Optimizer</title>
  <link rel="stylesheet" href="popup.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <header>
      <h1>Search Optimizer</h1>
      <p>Clean up your search results</p>
    </header>

    <div class="modules-section">
      <h3 class="collapse-toggle" id="modules-toggle">
        Hide Google Modules
        <span class="toggle-arrow" id="modules-arrow">&#9654;</span>
      </h3>
      <div class="module-toggles" id="modules-content" style="display:none">
        <label><input type="checkbox" id="mod-sponsored"> Sponsored Posts</label>
        <label><input type="checkbox" id="mod-latest"> Latest posts from...</label>
        <label><input type="checkbox" id="mod-products"> Products (Shopping)</label>
        <label><input type="checkbox" id="mod-images"> Images</label>
        <label><input type="checkbox" id="mod-videos"> Videos</label>
        <label><input type="checkbox" id="mod-ask"> People also ask</label>
        <label><input type="checkbox" id="mod-search"> People also search for</label>
      </div>
    </div>
    <div class="settings-section">
      <div class="setting-row">
        <div class="setting-label">
          <span>Infinite Scroll</span>
          <small>Automatically load more results when scrolling</small>
        </div>
        <label class="switch">
          <input type="checkbox" id="toggle-infinite-scroll">
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <div class="add-section">
      <h3>Hide Specific Domains</h3>
      <input type="text" id="site-input" placeholder="e.g. pinterest.com">
      <button id="add-btn">Add Filter</button>
    </div>

    <div class="list-section">
      <h3>Active Domain Filters</h3>
      <ul id="site-list"></ul>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
